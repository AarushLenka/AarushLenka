name: Update profile dashboard

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/generate_dashboard_svg.py"
      - "assets/github.png"
      - ".github/workflows/update-profile-dashboard.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate dashboard SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: AarushLenka
          COUNT_CODE_LINES: "1"
        run: python3 -B scripts/generate_dashboard_svg.py

      - name: Commit dashboard update
        run: |
          if git diff --quiet -- assets/profile-dashboard.svg; then
            echo "Dashboard is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-dashboard.svg
          git commit -m "Update profile dashboard"
          git push
